<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Show Project - Ayodeji Ayorinde Level 500</title>
  <link href="style.css" rel="stylesheet" />
</head>

<body>
  <header class="page-header">
    <h1>TV Show Project | Ayodeji Ayorinde Level 500</h1>
    <nav>
      <button id="back-to-shows" class="nav-btn" style="display: none;">&larr; Back to all shows</button>
    </nav>
  </header>

  <div id="search-container">
    <div id="show-search-wrapper">
      <input type="text" id="show-search-input" placeholder="Search shows...">
    </div>

    <div id="episode-controls-wrapper" style="display: none;">
      <select id="show-selector">
        <option value="">Select a show...</option>
      </select>
      <input type="text" id="episode-search-input" placeholder="Search episodes...">
    </div>

    <p id="search-count-display"></p>
  </div>

  <main>
    <div id="root"></div>
  </main>

  <script src="script.js"></script>
</body>

</html>
