<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Kayanat Suleman (KayanatSuleman)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="controls">
      <label for="search-input">Search episodes:</label>
      <input
        type="text"
        id="search-input"
        placeholder="Search by episode name or summary"
      />

      <label for="episode-select">Choose an episode:</label>
      <select id="episode-select">
        <option value="all">All Episodes</option>
      </select>

      <p id="episode-count"></p>
    </div>

    <div id="root"></div>

    <script src="episodes.js"></script>
    <script src="script.js"></script>
  </body>
</html>
